name=group4-peft-neo4j-sink
topics=peft.cpg.nodes,peft.cpg.edges
connector.class=streams.kafka.connect.sink.Neo4jSinkConnector
key.converter=org.apache.kafka.connect.storage.StringConverter
value.converter=org.apache.kafka.connect.json.JsonConverter
value.converter.schemas.enable=false
errors.tolerance=all
errors.log.enable=true
errors.log.include.messages=true
neo4j.server.uri=bolt://neo4j:7687
neo4j.authentication.basic.username=neo4j
neo4j.authentication.basic.password=password123
neo4j.topic.cypher.peft.cpg.nodes=MERGE (n:CPGNode {id: event.element_id}) SET n += event.properties, n.kind = event.kind, n.file_path = event.file_path, n.repo = event.repo, n.commit_sha = event.commit_sha, n.updated_at = datetime()
neo4j.topic.cypher.peft.cpg.edges=MATCH (a {id: event.source_id}), (b {id: event.target_id}) MERGE (a)-[r:CPG_EDGE {id: event.edge_id, kind: event.edge_type}]->(b) SET r += event.properties, r.updated_at = datetime()

