<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="360" viewBox="0 0 1400 360" role="img" aria-labelledby="title desc">
  <title id="title">Lab 04 streaming architecture</title>
  <desc id="desc">Repository discovery flows into an incremental parser, then Kafka topics, then two parallel sinks for Neo4j and MongoDB, and finally the report.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f7fb"/>
      <stop offset="100%" stop-color="#eef3f9"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 z" fill="#29465b"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #1d2b36; }
      .label { font: 700 20px Arial, sans-serif; fill: #183042; }
      .small { font: 400 15px Arial, sans-serif; fill: #415261; }
      .box { fill: url(#box); stroke: #7b91a5; stroke-width: 2; rx: 18; ry: 18; }
      .lane { fill: rgba(41, 70, 91, 0.06); stroke: rgba(41, 70, 91, 0.15); stroke-width: 1.5; rx: 20; ry: 20; }
      .arrow { stroke: #29465b; stroke-width: 3.25; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="360" fill="url(#bg)"/>
  <text x="700" y="42" text-anchor="middle" class="title">Lab 04 End-to-End Streaming Architecture</text>

  <rect x="35" y="92" width="1330" height="220" class="lane"/>

  <rect x="60" y="130" width="160" height="120" class="box"/>
  <text x="140" y="165" text-anchor="middle" class="label">PEFT repo</text>
  <text x="140" y="195" text-anchor="middle" class="small">Python source tree</text>
  <text x="140" y="220" text-anchor="middle" class="small">Discovery + parsing</text>

  <rect x="270" y="130" width="190" height="120" class="box"/>
  <text x="365" y="165" text-anchor="middle" class="label">Incremental parser</text>
  <text x="365" y="195" text-anchor="middle" class="small">AST, CFG, DFG</text>
  <text x="365" y="220" text-anchor="middle" class="small">Stable IDs per event</text>

  <rect x="520" y="130" width="170" height="120" class="box"/>
  <text x="605" y="165" text-anchor="middle" class="label">Kafka topics</text>
  <text x="605" y="195" text-anchor="middle" class="small">Nodes, edges</text>
  <text x="605" y="220" text-anchor="middle" class="small">Metadata, errors</text>

  <rect x="740" y="102" width="170" height="72" class="box"/>
  <text x="825" y="136" text-anchor="middle" class="label">Neo4j sink</text>
  <text x="825" y="160" text-anchor="middle" class="small">Nodes + edges</text>

  <rect x="740" y="210" width="170" height="72" class="box"/>
  <text x="825" y="244" text-anchor="middle" class="label">Spark streaming</text>
  <text x="825" y="268" text-anchor="middle" class="small">Metadata only</text>

  <rect x="980" y="102" width="160" height="72" class="box"/>
  <text x="1060" y="136" text-anchor="middle" class="label">Neo4j</text>
  <text x="1060" y="160" text-anchor="middle" class="small">Graph topology</text>

  <rect x="980" y="210" width="160" height="72" class="box"/>
  <text x="1060" y="244" text-anchor="middle" class="label">MongoDB</text>
  <text x="1060" y="268" text-anchor="middle" class="small">File metadata</text>

  <path d="M220 190 L270 190" class="arrow"/>
  <path d="M460 190 L520 190" class="arrow"/>
  <path d="M690 150 L740 138" class="arrow"/>
  <path d="M690 150 L740 246" class="arrow"/>
  <path d="M910 138 L980 138" class="arrow"/>
  <path d="M910 246 L980 246" class="arrow"/>
</svg>
