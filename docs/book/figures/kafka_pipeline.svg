<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360" role="img" aria-label="Kafka pipeline overview">
  <defs>
    <style>
      .box{fill:#f8fafc;stroke:#334155;stroke-width:1.5;rx:8}
      .topic{fill:#eef2ff;stroke:#4338ca;stroke-width:1.5;rx:8}
      .sink{fill:#ecfdf5;stroke:#047857;stroke-width:1.5;rx:8}
      .text{font-family:Arial,Helvetica,sans-serif;font-size:15px;fill:#0f172a}
      .small{font-size:12px;fill:#475569}
      .arrow{stroke:#334155;stroke-width:1.8;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="36" y="132" width="150" height="78" class="box"/>
  <text x="111" y="164" text-anchor="middle" class="text">PEFT source file</text>
  <text x="111" y="188" text-anchor="middle" class="small">loraplus.py sample</text>
  <rect x="248" y="132" width="145" height="78" class="box"/>
  <text x="320" y="164" text-anchor="middle" class="text">Parser</text>
  <text x="320" y="188" text-anchor="middle" class="small">AST / CFG / DFG / calls</text>
  <rect x="465" y="34" width="190" height="54" class="topic"/>
  <text x="560" y="56" text-anchor="middle" class="text">peft.cpg.nodes</text>
  <text x="560" y="76" text-anchor="middle" class="small">233 events</text>
  <rect x="465" y="112" width="190" height="54" class="topic"/>
  <text x="560" y="134" text-anchor="middle" class="text">peft.cpg.edges</text>
  <text x="560" y="154" text-anchor="middle" class="small">321 events</text>
  <rect x="465" y="190" width="190" height="54" class="topic"/>
  <text x="560" y="212" text-anchor="middle" class="text">peft.source.metadata</text>
  <text x="560" y="232" text-anchor="middle" class="small">1 event</text>
  <rect x="465" y="268" width="190" height="54" class="topic"/>
  <text x="560" y="290" text-anchor="middle" class="text">peft.parser.errors</text>
  <text x="560" y="310" text-anchor="middle" class="small">error topic</text>
  <rect x="725" y="78" width="140" height="82" class="sink"/>
  <text x="795" y="111" text-anchor="middle" class="text">Neo4j</text>
  <text x="795" y="135" text-anchor="middle" class="small">graph sink</text>
  <rect x="725" y="190" width="140" height="82" class="sink"/>
  <text x="795" y="224" text-anchor="middle" class="text">Spark + MongoDB</text>
  <text x="795" y="248" text-anchor="middle" class="small">metadata sink</text>
  <path d="M186 171 H248" class="arrow"/>
  <path d="M393 154 C430 154 430 61 465 61" class="arrow"/>
  <path d="M393 164 C430 164 430 139 465 139" class="arrow"/>
  <path d="M393 178 C430 178 430 217 465 217" class="arrow"/>
  <path d="M393 190 C430 190 430 295 465 295" class="arrow"/>
  <path d="M655 61 C690 61 690 104 725 104" class="arrow"/>
  <path d="M655 139 C690 139 690 134 725 134" class="arrow"/>
  <path d="M655 217 H725" class="arrow"/>
</svg>
